<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browse Games — GameVault</title>
  <meta name="description" content="Search and filter the full GameVault database by title, genre and platform.">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'%3E%3Crect width='40' height='40' fill='%2314121F'/%3E%3Crect x='16' y='4' width='8' height='16' fill='%23FF3E9A'/%3E%3Crect x='12' y='20' width='16' height='6' fill='%232FE6FF'/%3E%3Crect x='6' y='26' width='28' height='8' fill='%231E1B2E' stroke='%232FE6FF' stroke-width='2'/%3E%3Crect x='10' y='29' width='3' height='3' fill='%23FFC145'/%3E%3Crect x='27' y='29' width='3' height='3' fill='%23FF3E9A'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="site-header">
    <nav class="nav">
      <a class="nav-brand" href="index.html">
        <svg width="30" height="30" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect x="16" y="4" width="8" height="16" fill="#FF3E9A"/>
          <rect x="12" y="20" width="16" height="6" fill="#2FE6FF"/>
          <rect x="6" y="26" width="28" height="8" fill="#1E1B2E" stroke="#2FE6FF" stroke-width="2"/>
          <rect x="10" y="29" width="3" height="3" fill="#FFC145"/>
          <rect x="27" y="29" width="3" height="3" fill="#FF3E9A"/>
          <circle cx="20" cy="10" r="3" fill="#14121F"/>
        </svg>
        <span>GAMEVAULT</span>
      </a>
      <button class="nav-toggle" id="nav-toggle" aria-expanded="false" aria-controls="nav-links">Menu</button>
      <ul class="nav-links" id="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="games.html" aria-current="page">Browse</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section style="padding-bottom: 0;">
      <div class="container">
        <span class="eyebrow">Full catalog</span>
        <h1>Browse the database</h1>
        <p class="lead">Type a title, or narrow things down by genre and platform.</p>
      </div>
    </section>

    <section>
      <div class="container">
        <div class="filter-bar">
          <div class="search-field">
            <label for="search-input" class="visually-hidden">Search titles</label>
            <input type="text" id="search-input" placeholder="Search by title…" autocomplete="off">
          </div>
          <select id="genre-select" aria-label="Filter by genre">
            <option value="all">All genres</option>
          </select>
          <select id="platform-select" aria-label="Filter by platform">
            <option value="all">All platforms</option>
          </select>
        </div>

        <p class="result-count" id="result-count"></p>

        <div class="game-grid" id="game-grid"></div>
        <div class="empty-state" id="empty-state">No cartridges match that search. Try a different title, genre or platform.</div>
      </div>
    </section>
  </main>

  <div class="modal-overlay" id="game-modal">
    <div class="modal" role="dialog" aria-modal="true" id="modal-content"></div>
  </div>

  <footer class="site-footer">
    <div class="container footer-row">
      <span>GameVault — a class project built with HTML, CSS &amp; JavaScript.</span>
      <a href="contact.html">Get in touch</a>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
